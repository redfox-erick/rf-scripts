<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookahead — Demo</title>
    <link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px; height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; background: #f8fafc;
        }

        /* Toolbar */
        .toolbar {
            height: 44px; background: #fff; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0;
        }
        .toolbar h2 { font-size: 14px; font-weight: 600; color: #1e293b; flex: 1; }
        .toolbar label { font-size: 12px; color: #64748b; }
        .toolbar select, .toolbar button {
            border: 1px solid #d0d5dd; border-radius: 6px; padding: 4px 12px;
            font-size: 12px; background: #fff; cursor: pointer; color: #374151;
        }
        .toolbar button:hover { background: #f1f5f9; }
        .toolbar button.active { background: #1d5f47; color: #fff; border-color: #1d5f47; }

        /* Timeline fills the rest */
        #timeline {
            flex: 1;
            overflow: hidden;
        }

        /* ---- vis-timeline overrides ---- */
        .vis-timeline {
            border: none !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
            height: 100% !important;
        }
        .vis-time-axis .vis-text {
            font-size: 11px !important;
            color: #64748b !important;
        }
        .vis-current-time {
            background-color: #ef4444 !important;
            width: 2px !important;
        }
        .vis-item {
            border-radius: 5px !important;
            font-size: 12px !important;
            font-weight: 500 !important;
            border-width: 0 !important;
            color: #fff !important;
        }
        .vis-item.vis-selected {
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #36ac81 !important;
        }
        .vis-item .vis-item-content {
            padding: 3px 10px !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Out-of-range dimmed style */
        .vis-item.out-of-range {
            opacity: 0.45 !important;
        }
        /* Info bar at bottom */
        .info-bar {
            height: 28px; background: #f1f5f9; border-top: 1px solid #e2e8f0;
            display: flex; align-items: center; padding: 0 14px;
            font-size: 11px; color: #64748b; gap: 20px; flex-shrink: 0;
        }
        .info-bar span b { color: #1e293b; }
    </style>
</head>
<body>

<div class="toolbar">
    <h2>📅 Lookahead — 4 semanas</h2>
    <label>Periodo:</label>
    <select id="sel-periodo">
        <option value="2">2 semanas</option>
        <option value="4" selected>4 semanas</option>
        <option value="6">6 semanas</option>
        <option value="8">8 semanas</option>
    </select>
    <button id="btn-today">Hoy</button>
    <button id="btn-lock">🔒 Bloquear</button>
</div>

<div id="timeline"></div>

<div class="info-bar">
    <span>Arrastra para mover · Jala los extremos para cambiar duración · <b>Supr</b> para eliminar</span>
    <span id="info-sel" style="margin-left:auto;"></span>
</div>

<script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<script>
(function() {
    var START = new Date("2026-03-16"); // Monday
    START.setHours(0,0,0,0);

    function addDays(d, n) {
        var r = new Date(d);
        r.setDate(r.getDate() + n);
        return r;
    }

    // ---- Task data ----
    // Some tasks are inside the 4-week window, some extend outside it.
    var items = new vis.DataSet([
        // --- Inside range (Mar 16 – Apr 13) ---
        {
            id: 1,
            content: "Colada de Losa",
            start: new Date("2026-03-17"), end: new Date("2026-03-20"),
            style: "background:#f59e0b; border-color:#f59e0b;"
        },
        {
            id: 2,
            content: "Estructura de Acero",
            start: new Date("2026-03-20"), end: new Date("2026-03-27"),
            style: "background:#3b82f6; border-color:#3b82f6;"
        },
        {
            id: 3,
            content: "HVAC Zona B",
            start: new Date("2026-03-23"), end: new Date("2026-03-30"),
            style: "background:#8b5cf6; border-color:#8b5cf6;"
        },
        {
            id: 4,
            content: "Conduit Eléctrico",
            start: new Date("2026-03-30"), end: new Date("2026-04-03"),
            style: "background:#06b6d4; border-color:#06b6d4;"
        },
        {
            id: 5,
            content: "Muros Interiores L1",
            start: new Date("2026-04-01"), end: new Date("2026-04-08"),
            style: "background:#f97316; border-color:#f97316;"
        },
        {
            id: 6,
            content: "Stack de Plomería",
            start: new Date("2026-04-06"), end: new Date("2026-04-10"),
            style: "background:#36ac81; border-color:#36ac81;"
        },

        // --- Starts BEFORE range (se ve recortada al inicio) ---
        {
            id: 7,
            className: "out-of-range",
            content: "Cimentación Bloque B ◀",
            start: new Date("2026-03-02"), end: new Date("2026-03-18"),
            style: "background:#94a3b8; border-color:#94a3b8;"
        },

        // --- Starts inside but ends AFTER range ---
        {
            id: 8,
            content: "Instalación Ventanas ▶",
            start: new Date("2026-04-08"), end: new Date("2026-04-22"),
            style: "background:#ec4899; border-color:#ec4899;"
        },

        // --- Completely AFTER range ---
        {
            id: 9,
            className: "out-of-range",
            content: "Pintura Exterior ▶▶",
            start: new Date("2026-04-20"), end: new Date("2026-04-28"),
            style: "background:#94a3b8; border-color:#94a3b8;"
        }
    ]);

    // ---- Timeline options ----
    var windowEnd = addDays(START, 4 * 7);

    var options = {
        stack: true,
        start: START,
        end: windowEnd,
        min: addDays(START, -21),   // can scroll 3 weeks back
        max: addDays(windowEnd, 21), // can scroll 3 weeks forward
        zoomMin: 7   * 86400000,
        zoomMax: 16  * 7 * 86400000,
        orientation: { axis: "top" },
        showCurrentTime: true,
        margin: { item: { horizontal: 2, vertical: 6 } },
        snap: function(date) {
            var d = new Date(date);
            d.setHours(0, 0, 0, 0);
            return d;
        },
        editable: { updateTime: true, updateGroup: false, remove: true },
        onMove: function(item, cb) {
            cb(item);
            showInfo(item);
        },
        onRemove: function(item, cb) {
            cb(item);
            document.getElementById("info-sel").textContent = "";
        },
        format: {
            minorLabels: { day: "D", week: "D MMM" }
        }
    };

    var container = document.getElementById("timeline");
    var timeline = new vis.Timeline(container, items, options);

    // Show selection info
    timeline.on("select", function(props) {
        if (!props.items.length) {
            document.getElementById("info-sel").textContent = "";
            return;
        }
        var item = items.get(props.items[0]);
        var days = Math.round((new Date(item.end) - new Date(item.start)) / 86400000);
        var fmt = function(d) {
            return new Date(d).toLocaleDateString("es-MX", { day: "2-digit", month: "short" });
        };
        document.getElementById("info-sel").textContent =
            item.content.replace(/ [◀▶]+$/, "") +
            " · " + fmt(item.start) + " → " + fmt(item.end) +
            " (" + days + " días)";
    });

    function showInfo(item) {
        var days = Math.round((new Date(item.end) - new Date(item.start)) / 86400000);
        var fmt = function(d) {
            return new Date(d).toLocaleDateString("es-MX", { day: "2-digit", month: "short" });
        };
        document.getElementById("info-sel").textContent =
            item.content.replace(/ [◀▶]+$/, "") +
            " · " + fmt(item.start) + " → " + fmt(item.end) +
            " (" + days + " días)";
    }

    // ---- Period selector ----
    document.getElementById("sel-periodo").addEventListener("change", function() {
        var weeks = +this.value;
        var newEnd = addDays(START, weeks * 7);
        timeline.setWindow(START, newEnd, { animation: { duration: 400 } });
        document.querySelector(".toolbar h2").textContent =
            "📅 Lookahead — " + weeks + " semana" + (weeks > 1 ? "s" : "");
    });

    // ---- Hoy button ----
    document.getElementById("btn-today").addEventListener("click", function() {
        timeline.moveTo(new Date(), { animation: { duration: 400 } });
    });

    // ---- Lock toggle ----
    var locked = false;
    document.getElementById("btn-lock").addEventListener("click", function() {
        locked = !locked;
        timeline.setOptions({
            editable: locked ? false : { updateTime: true, updateGroup: false, remove: true }
        });
        this.textContent = locked ? "🔓 Desbloquear" : "🔒 Bloquear";
        this.classList.toggle("active", locked);
    });

})();
</script>
</body>
</html>
